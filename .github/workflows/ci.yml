name: SENTINEL CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from sentinel.config import settings; print('Config OK')"
          python -c "from sentinel.models.database import init_db; print('Database OK')"
          python -c "from sentinel.training.models import ThreatClassifierMLP; print('ML Models OK')"
          python -c "from sentinel.iot.mqtt_broker import MQTTManager; print('IoT OK')"

      - name: Generate training data
        run: python run.py generate-data --samples 100

      - name: Train models (small)
        run: python run.py train --epochs 2 --batch-size 16

      - name: Check system status
        run: python run.py status
